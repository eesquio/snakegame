<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Snake | Antigravity</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <meta name="description" content="Um jogo clássico da cobrinha reinventado com estética moderna e neon.">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="game-container">
        <header>
            <div class="logo">NEO<span>SNAKE</span></div>
            <div class="score-board">
                <div class="score-item">
                    <span class="label">PONTOS</span>
                    <span id="score" class="value">000</span>
                </div>
                <div class="score-item">
                    <span class="label">RECORDE</span>
                    <span id="highScore" class="value">000</span>
                </div>
            </div>
        </header>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
            
            <div id="overlay" class="overlay">
                <div class="overlay-content">
                    <h1 id="overlayTitle">PRONTO?</h1>
                    <p id="overlayMessage">Use as setas ou WASD para guiar a serpente.</p>
                    <button id="startBtn">INICIAR JOGO</button>
                </div>
            </div>
        </div>

        <footer>
            <div class="controls-hint">
                <span>W A S D</span> ou <span>SETAS</span> para mover
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
